# Frontend nginx-config. Serveert de Flutter web-build, en proxy't:
#   /api/    → backend (REST)
#   /actuator/ → backend (health, alleen handig voor debugging)
#   /ws/     → backend (WebSocket; vereist Upgrade-header)
#
# Backend-service in-cluster is `backend:8080` (zie deploy/base/
# backend-service.yaml).

# Map die helpt bij websocket-upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen       8080;
    server_name  _;

    # OpenShift random-UID writes worden naar /tmp gerouteerd.
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    root   /usr/share/nginx/html;
    index  index.html;

    # Cache-headers: bootstrap-bestanden mogen nooit gecached blijven, want
    # bij een nieuwe deploy moet de browser de nieuwe `flutter_bootstrap.js`
    # zien (anders blijft een mobiele Chrome de oude bundel laden). De
    # overige assets zijn gehashed in de filename en mogen lang cachen.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # Gehashte assets (canvaskit/, assets/, *.js met content-hash) mogen
    # immutable lang cachen — hun naam verandert per build.
    location ~* \.(js|css|wasm|woff2?|ttf|otf|png|jpg|jpeg|gif|svg|webp|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Flutter web is een SPA: alles dat geen file is fallback'en naar index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST naar backend.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;     # daily-summary kan >30s duren
    }

    # Actuator alleen voor interne debugging.
    location /actuator/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # WebSocket-endpoint. Spring's WS-handler luistert hier op (zie
    # WebSocketConfig in de backend).
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1d;
    }

    # Gzip-compressie voor de Flutter-bundle (CanvasKit is groot).
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;
    gzip_min_length 1024;
}
