# Frontend nginx-config. Serveert de Flutter web-build, en proxy't:
#   /api/    → backend (REST)
#   /actuator/ → backend (health, alleen handig voor debugging)
#   /ws/     → backend (WebSocket; vereist Upgrade-header)
#
# Backend-service in-cluster is `backend:8080` (zie deploy/base/
# backend-service.yaml).

# Map die helpt bij websocket-upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen       8080;
    server_name  _;

    # OpenShift random-UID writes worden naar /tmp gerouteerd.
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Service-worker kill-switch ──────────────────────────────────────
    # De app bouwt met --pwa-strategy=none (geen SW). Bezoekers die nog een
    # OUDE service worker hebben (van een eerdere build) blijven anders de
    # verouderde app zien — en een vers gedeelde deeplink-URL (/feed/<id>)
    # opent dan het item niet. Deze stub-SW wordt door de oude SW opgepikt
    # bij z'n update-check, wist alle caches, deregistreert zichzelf en
    # herlaadt de openstaande tabs — eenmalig, daarna is er nooit meer een SW.
    location = /flutter_service_worker.js {
        default_type application/javascript;
        add_header Cache-Control "no-store" always;
        return 200 "self.addEventListener('install',function(){self.skipWaiting();});self.addEventListener('activate',function(e){e.waitUntil((async function(){try{var ks=await caches.keys();await Promise.all(ks.map(function(k){return caches.delete(k);}));await self.registration.unregister();var cs=await self.clients.matchAll();cs.forEach(function(c){c.navigate(c.url);});}catch(err){}})());});";
    }

    # ── Enige veilig-immutable bestand: de content-gehashte app-bundle ──
    # main.<hash>.js krijgt elke build een nieuwe naam/URL (zie Dockerfile),
    # dus die mag eindeloos cachen. Moet vóór de generieke regel staan.
    location ~* ^/main\.[0-9a-f]+\.js$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ── Al het andere: altijd revalideren (ETag → snelle 304) ───────────
    # index.html, flutter_bootstrap.js, flutter.js, fonts en canvaskit/wasm
    # houden een VASTE naam; immutable cachen zou na een deploy een oude
    # versie blijven serveren. no-cache: de browser revalideert en haalt
    # nieuwe versies meteen op. Flutter web is een SPA: alles dat geen file
    # is fallback't naar index.html — zo werken ook deeplink-paden als
    # /feed/<id> en /rss/<id>.
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    # REST naar backend.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;     # daily-summary kan >30s duren
    }

    # Actuator alleen voor interne debugging.
    location /actuator/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # WebSocket-endpoint. Spring's WS-handler luistert hier op (zie
    # WebSocketConfig in de backend).
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1d;
    }

    # Gzip-compressie voor de Flutter-bundle (CanvasKit is groot).
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;
    gzip_min_length 1024;
}
