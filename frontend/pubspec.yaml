name: personal_news_feed
description: "Persoonlijke AI-nieuwsfeed met podcast-generatie."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  http: ^1.2.2
  web_socket_channel: ^3.0.1
  shared_preferences: ^2.3.3
  just_audio: ^0.9.42
  url_launcher: ^6.3.1
  flutter_markdown: ^0.7.4
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png

# Genereer de Android/iOS-launcher-icons uit assets/app_icon.png:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/app_icon.png"
  # Adaptive icon (Android 8+): voorgrond dezelfde art op een vlakke
  # achtergrond. We gebruiken het bron-PNG als voorgrond — de afgeronde
  # rand wordt door Android zelf gemaskerd, dus dat valt buiten beeld
  # maar voorkomt witte randen.
  adaptive_icon_background: "#3F51B5"
  adaptive_icon_foreground: "assets/app_icon.png"
  remove_alpha_ios: true
