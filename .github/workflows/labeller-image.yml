name: Build preview-ns-labeller image

on:
  push:
    branches: [main]
    paths:
      - 'deploy/preview-ns-labeller/**'
      - '.github/workflows/labeller-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/robbertvdzon/preview-ns-labeller

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: deploy/preview-ns-labeller
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.sha.outputs.tag }}
            ${{ env.IMAGE }}:main
          cache-from: type=gha,scope=labeller
          cache-to: type=gha,mode=max,scope=labeller
