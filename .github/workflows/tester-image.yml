name: Build claude-tester image

# Bouwt het claude-tester-image (claude-runner + Playwright + Chromium)
# en pusht naar ghcr.io. Trigger: pushes naar main waar
# deploy/claude-tester/** is gewijzigd, plus handmatige dispatch.
#
# Let op: de FROM-clausule wijst naar claude-runner:main, dus dit image
# herbouwt automatisch als de runner-image is bijgewerkt — maar alleen
# als er ook een claude-tester-trigger is. Handmatige bump via
# workflow_dispatch is dan handig.

on:
  push:
    branches: [main]
    paths:
      - 'deploy/claude-tester/**'
      - '.github/workflows/tester-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/robbertvdzon/claude-tester

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: deploy/claude-tester
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.sha.outputs.tag }}
            ${{ env.IMAGE }}:main
          cache-from: type=gha,scope=claude-tester
          cache-to: type=gha,mode=max,scope=claude-tester
