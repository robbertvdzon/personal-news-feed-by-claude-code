name: Build claude-tester image

# Bouwt het claude-tester-image (claude-runner + Playwright + Chromium)
# en pusht naar ghcr.io.
#
# Triggers:
#   * push naar main op deploy/claude-tester/** — eigen image-changes
#   * workflow_run na "Build claude-runner image" — automatisch
#     herbouwen wanneer de base (FROM claude-runner:main) is vernieuwd,
#     zodat tester-pods altijd de nieuwste runner.sh + helpers hebben.
#   * workflow_dispatch — handmatige rebuild

on:
  push:
    branches: [main]
    paths:
      - 'deploy/claude-tester/**'
      - '.github/workflows/tester-image.yml'
  workflow_run:
    workflows: ["Build claude-runner image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/robbertvdzon/claude-tester

jobs:
  build:
    runs-on: ubuntu-latest
    # Bij workflow_run-trigger: alleen rebuilden als de upstream run
    # geslaagd is. Bij andere triggers (push/dispatch): altijd draaien.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: deploy/claude-tester
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.sha.outputs.tag }}
            ${{ env.IMAGE }}:main
          cache-from: type=gha,scope=claude-tester
          cache-to: type=gha,mode=max,scope=claude-tester
