name: Build container images

# Bouwt backend- en frontend-images en pusht naar ghcr.io.
#
# Triggers:
#   * Push naar main         → bouw, push, en update kustomization.yaml
#                              (ArgoCD synct prod naar nieuwe SHA)
#   * Pull-request van ai/*  → bouw + push met de PR's HEAD-SHA als tag.
#                              ApplicationSet (S-06) zet die SHA in de
#                              preview-deploy, dus zonder dit zou de
#                              preview een non-existing image proberen
#                              te pullen.

on:
  push:
    branches: [main]
    paths:
      - 'newsfeedbackend/**'
      - 'frontend/**'
      - '.github/workflows/build-images.yml'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - 'newsfeedbackend/**'
      - 'frontend/**'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:

permissions:
  contents: write    # nodig voor de auto-commit van kustomization.yaml (alleen op main)
  packages: write    # push naar ghcr.io
  pull-requests: write   # zodat we eventueel PR-status kunnen updaten

# Per branch een aparte concurrency-group zodat een PR niet een main-build
# kan blokkeren (en vice versa).
concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/robbertvdzon/personal-news-feed-backend
  FRONTEND_IMAGE: ghcr.io/robbertvdzon/personal-news-feed-frontend

jobs:
  build-backend:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Voor PR's: checkout de PR's HEAD (niet de merge-commit) zodat
          # `git rev-parse HEAD` overeenkomt met github.event.pull_request.head.sha.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set short SHA tag
        id: meta
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push backend
        uses: docker/build-push-action@v6
        with:
          context: newsfeedbackend/newsfeedbackend
          push: true
          # Op main: extra `:main` tag voor handige fallback.
          # Op PR's: alleen de sha-tag (geen `:main` overschrijven!).
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ github.event_name == 'push' && format('{0}:main', env.BACKEND_IMAGE) || '' }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set short SHA tag
        id: meta
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ github.event_name == 'push' && format('{0}:main', env.FRONTEND_IMAGE) || '' }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # Bumpt kustomization.yaml alleen voor main-builds. Voor PR's pakt de
  # ApplicationSet de PR's HEAD-SHA op via z'n template — geen commit
  # nodig in de PR-branch.
  bump-manifests:
    if: github.event_name == 'push'
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kustomize
        run: |
          curl -fsSL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update image tags in kustomization
        working-directory: deploy/base
        run: |
          kustomize edit set image \
            backend=${BACKEND_IMAGE}:${{ needs.build-backend.outputs.tag }} \
            frontend=${FRONTEND_IMAGE}:${{ needs.build-frontend.outputs.tag }}

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No manifest changes"
            exit 0
          fi
          git add deploy/base/kustomization.yaml
          git commit -m "ci: bump images to ${{ needs.build-backend.outputs.tag }}"
          git push
