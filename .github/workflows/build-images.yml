name: Build container images

# Bouwt backend- en frontend-images en pusht naar ghcr.io.
# Daarna update 't de image-tags in deploy/base/kustomization.yaml en
# committet die terug — ArgoCD ziet de nieuwe SHA en synct.
#
# Trigger: alleen op pushes naar main waar app-code wijzigt (niet op
# wijzigingen in /deploy zelf, anders krijgen we een commit-loop).

on:
  push:
    branches: [main]
    paths:
      - 'newsfeedbackend/**'
      - 'frontend/**'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:

permissions:
  contents: write    # nodig voor de auto-commit van kustomization.yaml
  packages: write    # push naar ghcr.io

concurrency:
  group: build-images
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/robbertvdzon/personal-news-feed-backend
  FRONTEND_IMAGE: ghcr.io/robbertvdzon/personal-news-feed-frontend

jobs:
  build-backend:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA tag
        id: meta
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push backend
        uses: docker/build-push-action@v6
        with:
          context: newsfeedbackend/newsfeedbackend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:main
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA tag
        id: meta
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:main
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  bump-manifests:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Standaard auto-token werkt; voor een protected-branch-flow
          # zou je hier een PAT/Deploy-key gebruiken.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kustomize
        run: |
          curl -fsSL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update image tags in kustomization
        working-directory: deploy/base
        run: |
          kustomize edit set image \
            backend=${BACKEND_IMAGE}:${{ needs.build-backend.outputs.tag }} \
            frontend=${FRONTEND_IMAGE}:${{ needs.build-frontend.outputs.tag }}

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No manifest changes"
            exit 0
          fi
          git add deploy/base/kustomization.yaml
          git commit -m "ci: bump images to ${{ needs.build-backend.outputs.tag }}"
          git push
