name: Build status-dashboard image

# Bouwt het status-dashboard-image, pusht naar ghcr.io en update de
# image-tag in deploy/tooling/kustomization.yaml. ArgoCD synct daarna
# automatisch — geen handmatige rollout-restart meer nodig.

on:
  push:
    branches: [main]
    paths:
      - 'deploy/status-dashboard/**'
      - '.github/workflows/status-dashboard-image.yml'
  workflow_dispatch:

permissions:
  contents: write    # nodig voor de auto-commit van kustomization.yaml
  packages: write    # push naar ghcr.io

env:
  IMAGE: ghcr.io/robbertvdzon/status-dashboard

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.sha.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: deploy/status-dashboard
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.sha.outputs.tag }}
            ${{ env.IMAGE }}:main
          cache-from: type=gha,scope=status-dashboard
          cache-to: type=gha,mode=max,scope=status-dashboard

  bump-manifests:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump image tag in deploy/tooling
        run: |
          .github/scripts/bump-images.sh \
            deploy/tooling \
            "ci: bump status-dashboard to ${{ needs.build.outputs.tag }}" \
            "ghcr.io/robbertvdzon/status-dashboard=ghcr.io/robbertvdzon/status-dashboard:${{ needs.build.outputs.tag }}"
