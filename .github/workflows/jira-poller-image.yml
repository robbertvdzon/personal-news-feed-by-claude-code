name: Build jira-poller image

# Bouwt het jira-poller-image, pusht naar ghcr.io en update de
# image-tag in deploy/tooling/kustomization.yaml. ArgoCD synct daarna
# automatisch — geen handmatige rollout-restart meer nodig.

on:
  push:
    branches: [main]
    paths:
      - 'deploy/jira-poller/**'
      - '.github/workflows/jira-poller-image.yml'
  workflow_dispatch:

permissions:
  contents: write    # nodig voor de auto-commit van kustomization.yaml
  packages: write    # push naar ghcr.io

env:
  IMAGE: ghcr.io/robbertvdzon/jira-poller

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.sha.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: deploy/jira-poller
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.sha.outputs.tag }}
            ${{ env.IMAGE }}:main
          cache-from: type=gha,scope=jira-poller
          cache-to: type=gha,mode=max,scope=jira-poller

  bump-manifests:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kustomize
        run: |
          curl -fsSL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update image tag in deploy/tooling
        working-directory: deploy/tooling
        run: |
          kustomize edit set image \
            ghcr.io/robbertvdzon/jira-poller=ghcr.io/robbertvdzon/jira-poller:${{ needs.build.outputs.tag }}

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No manifest changes"
            exit 0
          fi
          git add deploy/tooling/kustomization.yaml
          git commit -m "ci: bump jira-poller to ${{ needs.build.outputs.tag }}"
          git push
