# Reader-frontend nginx-config. Serveert de Flutter web-build en proxy't
# /api/ door naar de backend-service in-cluster (`backend:8080`).
#
# De reader gebruikt alleen het publieke read-only endpoint
# /api/shared/feed — geen /ws/ nodig.

server {
    listen       8080;
    server_name  _;

    # OpenShift random-UID writes naar /tmp.
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    root   /usr/share/nginx/html;
    index  index.html;

    # Bootstrap-bestanden nooit cachen (nieuwe deploy moet zichtbaar zijn).
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }
    location = /flutter_bootstrap.js {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # Gehashte assets mogen lang cachen.
    location ~* \.(js|css|wasm|woff2?|ttf|otf|png|jpg|jpeg|gif|svg|webp|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA-fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST naar backend.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;
    gzip_min_length 1024;
}
