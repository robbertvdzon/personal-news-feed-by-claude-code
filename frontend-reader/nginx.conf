# Reader-frontend nginx-config. Serveert de Flutter web-build en proxy't
# /api/ door naar de backend-service in-cluster (`backend:8080`).
#
# De reader gebruikt alleen het publieke read-only endpoint
# /api/shared/feed — geen /ws/ nodig.

server {
    listen       8080;
    server_name  _;

    # OpenShift random-UID writes naar /tmp.
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Service-worker kill-switch ──────────────────────────────────────
    # De app bouwt met --pwa-strategy=none (geen SW). Bezoekers die nog een
    # OUDE service worker hebben (van een eerdere build) blijven anders de
    # verouderde app zien. Deze stub-SW wordt door de oude SW opgepikt bij
    # z'n update-check, wist alle caches, deregistreert zichzelf en herlaadt
    # de openstaande tabs — eenmalig, daarna is er nooit meer een SW.
    location = /flutter_service_worker.js {
        default_type application/javascript;
        add_header Cache-Control "no-store" always;
        return 200 "self.addEventListener('install',function(){self.skipWaiting();});self.addEventListener('activate',function(e){e.waitUntil((async function(){try{var ks=await caches.keys();await Promise.all(ks.map(function(k){return caches.delete(k);}));await self.registration.unregister();var cs=await self.clients.matchAll();cs.forEach(function(c){c.navigate(c.url);});}catch(err){}})());});";
    }

    # ── Altijd vers: app-shell (index + bootstrap) via revalidatie ──────
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # ── Content-gehashte app-bundle (main.<hash>.js): veilig immutable ──
    # Nieuwe build = nieuwe naam = nieuwe URL, dus nooit stale ondanks de
    # lange cache. Moet vóór de generieke .js-regel staan.
    location ~* ^/main\.[0-9a-f]+\.js$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ── Overige js/css/json (bootstrap, flutter.js, …): altijd revalideren ─
    location ~* \.(js|css|json)$ {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # ── Grote, versie-gebonden binaries mogen lang cachen ───────────────
    location ~* \.(wasm|woff2?|ttf|otf|png|jpg|jpeg|gif|svg|webp|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA-fallback.
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    # REST naar backend.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;
    gzip_min_length 1024;
}
