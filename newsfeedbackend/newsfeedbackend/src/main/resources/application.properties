spring.application.name=newsfeedbackend
server.port=8080
# Bind op alle interfaces (default-gedrag, expliciet voor de duidelijkheid).
# Met deze instelling is de backend bereikbaar via localhost én via de
# LAN-ip / port-forward. Zet op 127.0.0.1 als je hem alleen lokaal
# beschikbaar wilt hebben.
server.address=0.0.0.0

# Data directory voor admin-only user-cleanup paden. Podcast-MP3's
# liggen sinds V5 in Postgres (audio_bytes), niet meer op deze disk.
app.data-dir=./data

# Database (Postgres via Neon of lokaal). URL + creds verwacht in env
# als JDBC-URL met query-params (zie .env).
spring.datasource.url=${PNF_DATABASE_URL:}
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# Flyway: migraties draaien automatisch bij start.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# Tolereer migraties die WEL in flyway_schema_history staan maar NIET in
# de repo (bv. verlaten/teruggetrokken V4 in een gedeelde preview-DB).
# Checksum-mismatches op aanwezige migraties blokkeren nog steeds de
# start, dus dit verzwakt de validatie niet voor onze eigen versies.
spring.flyway.ignore-migration-patterns=*:missing

# JWT configuration
app.jwt.secret=change-me-in-production-this-is-a-default-jwt-secret-that-must-be-replaced-32bytes-or-longer
app.jwt.ttl-days=30

# Tavily
app.tavily.api-key=${PNF_TAVILY_API_KEY:}
app.tavily.base-url=https://api.tavily.com

# OpenAI
app.openai.api-key=${PNF_OPENAI_API_KEY:}
app.openai.base-url=https://api.openai.com

# SF-114/SF-115: actie -> AI-model. Keys = actie-constanten uit ExternalCall.kt.
# Defaults conform de issue-tabel; per env-var (PNF_AI_MODEL_*) overschrijfbaar
# zonder code-wijziging. SF-115 schakelt de callers daadwerkelijk op OpenAI om.
app.ai.models.rss_summarize=${PNF_AI_MODEL_RSS_SUMMARIZE:gpt-5.4-mini}
app.ai.models.feed_summarize=${PNF_AI_MODEL_FEED_SUMMARIZE:gpt-5.4-mini}
app.ai.models.feed_score=${PNF_AI_MODEL_FEED_SCORE:gpt-5.4-mini}
app.ai.models.daily_summary=${PNF_AI_MODEL_DAILY_SUMMARY:gpt-5.4}
app.ai.models.podcast_episode_summarize=${PNF_AI_MODEL_PODCAST_EPISODE_SUMMARIZE:gpt-5.4-mini}
app.ai.models.podcast_transcribe=${PNF_AI_MODEL_PODCAST_TRANSCRIBE:gpt-4o-mini-transcribe}
app.ai.models.event_discovery=${PNF_AI_MODEL_EVENT_DISCOVERY:gpt-5.4-mini}
app.ai.models.event_video_discovery=${PNF_AI_MODEL_EVENT_VIDEO_DISCOVERY:gpt-5.4-mini}
app.ai.models.event_video_summarize=${PNF_AI_MODEL_EVENT_VIDEO_SUMMARIZE:gpt-5.4}
# SF-115: extra acties die voorheen op Anthropic draaiden.
# event_discovery_date = de losse datum-verrijkingsstap (lichte JSON-lookup) -> nano.
app.ai.models.event_discovery_date=${PNF_AI_MODEL_EVENT_DISCOVERY_DATE:gpt-5.4-nano}
app.ai.models.podcast_script=${PNF_AI_MODEL_PODCAST_SCRIPT:gpt-5.4-mini}
app.ai.models.podcast_topics=${PNF_AI_MODEL_PODCAST_TOPICS:gpt-5.4-mini}
app.ai.models.adhoc_summarize=${PNF_AI_MODEL_ADHOC_SUMMARIZE:gpt-5.4-mini}

# SF-117: tarieven per model (USD). Niet langer hardcoded in Pricing.kt.
# Afrekeneenheden: tokens (input/output per 1M), seconds (per minuut, transcriptie),
# characters (per 1M, TTS). Per call wordt cost_usd hieruit berekend.
# Bron-URL + datum-laatste-update voor handmatig bijwerken:
app.ai.pricing.source=https://openai.com/api/pricing/
app.ai.pricing.updated=2026-06-19
# Chat-modellen (tokens): GPT-5.4 officieel bevestigd; legacy via aggregators.
app.ai.pricing.models[gpt-5.4].input-per-million=2.50
app.ai.pricing.models[gpt-5.4].output-per-million=15.0
app.ai.pricing.models[gpt-5.4-mini].input-per-million=0.75
app.ai.pricing.models[gpt-5.4-mini].output-per-million=4.50
app.ai.pricing.models[gpt-5.4-nano].input-per-million=0.20
app.ai.pricing.models[gpt-5.4-nano].output-per-million=1.25
app.ai.pricing.models[gpt-4o-mini].input-per-million=0.15
app.ai.pricing.models[gpt-4o-mini].output-per-million=0.60
# Transcriptie (seconds → per minuut):
app.ai.pricing.models[gpt-4o-mini-transcribe].per-minute=0.003
app.ai.pricing.models[whisper-1].per-minute=0.006
# TTS (characters → per 1M):
app.ai.pricing.models[tts-1].per-million-chars=15.0

# ElevenLabs
app.elevenlabs.api-key=${PNF_ELEVENLABS_API_KEY:}
app.elevenlabs.base-url=https://api.elevenlabs.io
app.elevenlabs.voice-interviewer=Jn7U4vF8ZkmjZIZRn4Uk
app.elevenlabs.voice-guest=h6uBOiAjLKklte8hdYio

# Actuator
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# Async
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=200
spring.task.scheduling.pool.size=4

# KAN-60: tweefasen podcast-ingest — async transcript-worker.
# interval-ms = hoe vaak de worker tickt (max 1 episode per tick).
# initial-delay-ms = pauze na boot voor de Flyway/connection-pool warm-up.
# promotion-timeout-hours = na hoeveel uur op show-notes alsnog promotie
#   naar Feed-tab gebeurt als transcript niet binnenkomt (AC #6).
app.podcast.transcript-worker.interval-ms=120000
app.podcast.transcript-worker.initial-delay-ms=60000
app.podcast.transcript-worker.promotion-timeout-hours=24

# Logging
logging.level.root=INFO
logging.level.com.vdzon.newsfeedbackend=DEBUG
