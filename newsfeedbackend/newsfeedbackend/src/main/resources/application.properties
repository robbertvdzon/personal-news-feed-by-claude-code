spring.application.name=newsfeedbackend
server.port=8080
# Bind op alle interfaces (default-gedrag, expliciet voor de duidelijkheid).
# Met deze instelling is de backend bereikbaar via localhost én via de
# LAN-ip / port-forward. Zet op 127.0.0.1 als je hem alleen lokaal
# beschikbaar wilt hebben.
server.address=0.0.0.0

# Database (Postgres via Neon of lokaal). URL + creds verwacht in env
# als JDBC-URL met query-params (zie .env).
spring.datasource.url=${PNF_DATABASE_URL:}
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# Flyway: migraties draaien automatisch bij start.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT configuration
app.jwt.secret=change-me-in-production-this-is-a-default-jwt-secret-that-must-be-replaced-32bytes-or-longer
app.jwt.ttl-days=30

# Anthropic
app.anthropic.api-key=${PNF_ANTHROPIC_API_KEY:}
app.anthropic.base-url=https://api.anthropic.com
app.anthropic.model=claude-sonnet-4-5
app.anthropic.summary-model=claude-haiku-4-5-20251001

# Tavily
app.tavily.api-key=${PNF_TAVILY_API_KEY:}
app.tavily.base-url=https://api.tavily.com

# OpenAI
app.openai.api-key=${PNF_OPENAI_API_KEY:}
app.openai.base-url=https://api.openai.com

# ElevenLabs
app.elevenlabs.api-key=${PNF_ELEVENLABS_API_KEY:}
app.elevenlabs.base-url=https://api.elevenlabs.io
app.elevenlabs.voice-interviewer=Jn7U4vF8ZkmjZIZRn4Uk
app.elevenlabs.voice-guest=h6uBOiAjLKklte8hdYio

# Actuator
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# Async
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=200
spring.task.scheduling.pool.size=4

# Logging
logging.level.root=INFO
logging.level.com.vdzon.newsfeedbackend=DEBUG
