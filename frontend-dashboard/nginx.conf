server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Flutter web SPA — alles wat niet matched wordt naar index.html
  # geforward zodat in-app routes werken bij hard-refresh.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # APK-download. Direct serven, niet door SPA-fallback laten gaan.
  location = /download/dashboard.apk {
    types { } default_type application/vnd.android.package-archive;
    add_header Content-Disposition 'attachment; filename="dashboard.apk"';
    try_files /download/dashboard.apk =404;
  }

  # API-proxy naar de status-dashboard service in dezelfde namespace.
  # Op die manier hoeven we geen CORS te configureren — Flutter app
  # callt /api/* en de proxy reikt 't door.
  location /api/ {
    # Status-dashboard Service luistert op port 80 (intern naar pod-port
    # 8080 via targetPort). Verwijzen naar :8080 hier mist de Service
    # en hangt op connect-timeout → 504 gateway-timeout.
    proxy_pass http://status-dashboard.pnf-software-factory.svc.cluster.local:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_read_timeout 60s;
  }

  # Healthcheck voor K8s.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }
}
