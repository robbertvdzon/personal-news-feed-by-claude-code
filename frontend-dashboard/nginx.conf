server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Niet-gehashte Flutter-files mogen NIET worden gecached door
  # Cloudflare — anders serveert CF nog 4u na een deploy de oude JS.
  # index.html + flutter_bootstrap.js + main.dart.js + service-worker
  # zijn de critical-path files; allemaal no-cache.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files /index.html =404;
  }
  location = /flutter_bootstrap.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files /flutter_bootstrap.js =404;
  }
  location = /flutter_service_worker.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files /flutter_service_worker.js =404;
  }
  # main.dart.js is sinds de hash-busting-fix gehashed (main.<sha>.dart.js).
  # Het oude pad zou er niet meer moeten zijn; mocht 't toch terugkomen
  # via een buggy bootstrap.js dan zorgt no-cache voor verse fetch.
  location = /main.dart.js {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files /main.dart.js =404;
  }
  # Gehashte main-bundle: immutable. Naam verandert per build, dus
  # browser/CDN mogen 'm tot in der eeuwigheid bewaren.
  # Regex MOET gequote zijn — nginx interpreteert anders `{8,16}` als
  # block-syntax i.p.v. regex-quantifier.
  location ~ "^/main\.[0-9a-f]+\.dart\.js$" {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }
  location = /manifest.json {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files /manifest.json =404;
  }
  # Versie.json (gegenereerd door Flutter, geen hash in naam).
  location = /version.json {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files /version.json =404;
  }

  # Flutter web SPA — alles wat niet matched wordt naar index.html
  # geforward zodat in-app routes werken bij hard-refresh. Gehashte
  # assets (canvaskit, fonts, icons-XXX.json) krijgen long-cache.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # APK-download. Direct serven, niet door SPA-fallback laten gaan.
  location = /download/dashboard.apk {
    types { } default_type application/vnd.android.package-archive;
    add_header Content-Disposition 'attachment; filename="dashboard.apk"';
    try_files /download/dashboard.apk =404;
  }

  # API-proxy naar de status-dashboard service in dezelfde namespace.
  # Op die manier hoeven we geen CORS te configureren — Flutter app
  # callt /api/* en de proxy reikt 't door.
  location /api/ {
    # Status-dashboard Service luistert op port 80 (intern naar pod-port
    # 8080 via targetPort). Verwijzen naar :8080 hier mist de Service
    # en hangt op connect-timeout → 504 gateway-timeout.
    proxy_pass http://status-dashboard.pnf-software-factory.svc.cluster.local:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_read_timeout 60s;
  }

  # Healthcheck voor K8s.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }
}
