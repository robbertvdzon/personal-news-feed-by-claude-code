# RBAC voor de preview-ns-labeller.
#
# Heeft toegang tot:
#   * Applications in de argocd-namespace (read-only) — om destinations te lezen
#   * Namespaces (cluster-scope, create + label) — om preview-namespaces aan te maken
#   * Secrets (cluster-scope, get/patch) — om PNF_DATABASE_URL te overschrijven
#     met de branch-specifieke URL in pnf-pr-* namespaces (KAN-55)
#   * Pods (cluster-scope, delete) — om backend-pods te restarten na een
#     secret-patch zodat Spring de nieuwe URL oppakt (KAN-55)
#
# Cluster-scope omdat ArgoCD pr-namespaces dynamisch aanmaakt; we kunnen
# niet per-namespace een Role/RoleBinding hand-onderhouden. De ClusterRole
# is bewust beperkt tot secrets + pods (niet alles).
#
# Dit bestand blijft bewust een losse, handmatige `oc apply` (via
# ../bootstrap.sh) — ArgoCD's eigen ServiceAccount mag geen ClusterRole/
# ClusterRoleBinding-objecten aanmaken, en dat bewust niet fixen (zou ArgoCD
# praktisch rechten-op-alles kunnen geven). De bijbehorende Deployment staat
# sinds 2026-07-08 wél in GitOps, zie
# robberts-infrastructure/manifests/root-app/apps/preview-ns-labeller-deployment.yaml.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: preview-ns-labeller
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: preview-ns-labeller
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
  # KAN-55: PNF_DATABASE_URL patchen in newsfeed-api-keys secret per preview-ns.
  # Geen 'delete' nodig — reflector beheert de creatie + lifecycle.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # KAN-55: backend-pod restarten na secret-patch zodat Spring de nieuwe
  # PNF_DATABASE_URL oppakt. Pod-delete is de minste-rechten manier
  # (deployment respawnt 'm vanzelf). Geen patch op deployments nodig.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: preview-ns-labeller
subjects:
  - kind: ServiceAccount
    name: preview-ns-labeller
    namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: preview-ns-labeller
---
# Read-only Applications in argocd-namespace (geen cluster-scope nodig).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: preview-ns-labeller-app-reader
  namespace: argocd
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: preview-ns-labeller-app-reader
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: preview-ns-labeller
    namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: preview-ns-labeller-app-reader
