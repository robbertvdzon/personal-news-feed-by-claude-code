# ServiceAccount + ClusterRole + Binding voor de status-dashboard.
# Het dashboard moet:
#   - Applications lezen in argocd namespace (deploy-status)
#   - Pods + namespaces lezen across alle relevante namespaces:
#       personal-news-feed  (production)
#       pnf-pr-*            (preview-deploys, dynamisch)
#   - Namespaces listen om de pnf-pr-* set te ontdekken
#
# Cluster-wide is alles read-only. KAN-61 voegt een namespace-Role
# toe waarmee het dashboard claude-interactive-Jobs kan spawnen +
# stoppen binnen pnf-software-factory; dat is bewust namespace-scope
# zodat we cluster-wide nog steeds geen mutaties kunnen doen.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: status-dashboard
  namespace: pnf-software-factory
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: status-dashboard-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: status-dashboard-reader
subjects:
  - kind: ServiceAccount
    name: status-dashboard
    namespace: pnf-software-factory
roleRef:
  kind: ClusterRole
  name: status-dashboard-reader
  apiGroup: rbac.authorization.k8s.io
---
# KAN-61 — namespace-scope mutatie-rechten voor claude-interactive-
# Jobs. Dashboard spawnt/stopt sessie-pods in pnf-software-factory; de
# pod zelf draait onder de aparte ServiceAccount `claude-interactive`
# (zie deploy/claude-interactive/rbac.yaml).
#
# Géén ConfigMap-rechten meer (KAN-61-followup): het entrypoint-script
# wordt sinds dat fix inline meegegeven via `command: ["bash","-c",…]`
# op de Job-container, zodat de welcome-prompt geen mount nodig heeft.
# Dat is robuuster (één kubectl-call i.p.v. twee + owner-ref-patch) en
# scheelt RBAC-oppervlak.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: status-dashboard-claude-sessions
  namespace: pnf-software-factory
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: status-dashboard-claude-sessions
  namespace: pnf-software-factory
subjects:
  - kind: ServiceAccount
    name: status-dashboard
    namespace: pnf-software-factory
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: status-dashboard-claude-sessions
