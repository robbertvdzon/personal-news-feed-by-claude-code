# YouTrack Server — single-replica JVM-app.
#
# Replica's: altijd 1. YouTrack is GEEN clusterable applicatie (één
# write-master, embedded XodusDB). Schalen = verticaal (meer RAM/CPU).
#
# OpenShift-compat:
#   * Image draait als UID 13001 ("youtrack"-user in de container).
#     Onder restricted-v2 (default-SCC op OpenShift) wordt elke UID
#     overschreven naar de namespace's allowed range, wat YouTrack's
#     bin/ scripts laat falen. bootstrap.sh grant daarom `anyuid` SCC
#     aan de default-SA in deze namespace.
#   * fsGroup matched de container-user zodat de mounted PVCs writable
#     zijn zonder init-container.
#
# Startup-tijd: 60-120s op koude start (Hub-init + Xodus-warmup).
# `startupProbe` met failureThreshold=60 × 5s = 5 min absolute upper
# bound voordat de pod als faalend wordt gezien.
#
# Eerste-gebruik flow (na succesvolle deploy):
#   1. Wizard-token ophalen:
#        oc logs -n youtrack deploy/youtrack | grep -i "wizard.*token"
#   2. Browser: https://<route-hostname>/?wizard_token=<TOKEN>
#   3. Base URL bevestigen, Application Listen Port op 8080 laten,
#      Free license aanvragen, admin-password zetten.
#   4. Inloggen met username `admin` + password (oudere YouTrack gebruikt
#      `root`, vanaf 2024.x is het `admin`).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: youtrack
  namespace: youtrack
  labels:
    app: youtrack
spec:
  replicas: 1
  strategy:
    # Recreate (niet rollingUpdate): YouTrack heeft één RWO-PVC voor data
    # en kan geen twee instances tegelijk de DB laten openen. Recreate
    # garandeert oude pod weg vóór nieuwe pod start.
    type: Recreate
  selector:
    matchLabels:
      app: youtrack
  template:
    metadata:
      labels:
        app: youtrack
    spec:
      securityContext:
        # JetBrains image's interne user. Volume-ownership moet daarmee
        # overeenkomen; fsGroup zorgt voor automatic chown bij mount.
        runAsUser: 13001
        runAsGroup: 13001
        fsGroup: 13001
        # Skipt de chown als de root-dir al de juiste GID heeft — bij
        # 20Gi-data-volumes zou full-tree-chown bij elke pod-start
        # tientallen seconden duren.
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: youtrack
          image: jetbrains/youtrack:2026.1.13570
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: data
              mountPath: /opt/youtrack/data
            - name: conf
              mountPath: /opt/youtrack/conf
            - name: logs
              mountPath: /opt/youtrack/logs
            - name: backups
              mountPath: /opt/youtrack/backups
          resources:
            requests:
              # YouTrack heeft minimaal ~1GB heap nodig; 1.5Gi total
              # houdt 'm comfortabel voor solo-gebruik.
              cpu: "200m"
              memory: "1536Mi"
            limits:
              # Max heap auto-tuned door JVM op basis van cgroup-limit;
              # 4Gi geeft ruimte voor activity-stream + search-indexes.
              cpu: "2"
              memory: "4Gi"
          # Probes — eerste 5 min vrijgehouden voor startup, daarna
          # readiness elke 10s en liveness elke 30s. We pingen "/" want
          # /api/config geeft 200 pas ná de wizard; / werkt vanaf moment
          # dat Jetty up is en de wizard-token afgegeven heeft.
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: youtrack-data
        - name: conf
          persistentVolumeClaim:
            claimName: youtrack-conf
        - name: logs
          persistentVolumeClaim:
            claimName: youtrack-logs
        - name: backups
          persistentVolumeClaim:
            claimName: youtrack-backups
