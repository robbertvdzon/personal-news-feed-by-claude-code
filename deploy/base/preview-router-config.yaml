# nginx-config voor de preview-router. Ontvangt traffic voor
# `*.preview.vdzonsoftware.nl` via de Cloudflare-tunnel en route't naar
# de juiste preview-namespace op basis van de hostname.
#
# Hostname-format: pnf-<id>.preview.vdzonsoftware.nl
# → namespace: pnf-<id>
# → backend service: frontend.pnf-<id>.svc.cluster.local:8080
apiVersion: v1
kind: ConfigMap
metadata:
  name: preview-router-config
  labels:
    app: preview-router
data:
  nginx.conf: |
    worker_processes 1;
    pid /tmp/nginx.pid;
    error_log /dev/stderr warn;

    events {
        worker_connections 1024;
    }

    http {
        access_log /dev/stdout combined;
        client_body_temp_path /tmp/client_body;
        proxy_temp_path       /tmp/proxy;
        fastcgi_temp_path     /tmp/fastcgi;
        uwsgi_temp_path       /tmp/uwsgi;
        scgi_temp_path        /tmp/scgi;

        # Match-and-extract namespace uit `<ns>.preview.vdzonsoftware.nl`.
        # Capture group 1 = <ns> (alleen [a-z0-9-]). Veiligheidsklep: alleen
        # patroon dat met `pnf-` start mag matchen → voorkomt dat iemand
        # via een DNS-cname naar willekeurige cluster-services kan routeren.
        map $host $preview_ns {
            default "";
            "~^(pnf-[a-z0-9-]+)\.preview\.vdzonsoftware\.nl$" $1;
        }

        # WebSocket-upgrade-helper
        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }

        # In-cluster DNS resolver (CoreDNS). 5s TTL — als een preview-
        # namespace verschijnt/verdwijnt pakt nginx 't snel op zonder
        # zelf te restarten.
        resolver kube-dns.kube-system.svc.cluster.local valid=5s;

        server {
            listen       8080 default_server;
            server_name  _;

            # Geen preview-ns? Match-fout → 404, niet doorrouteren.
            if ($preview_ns = "") {
                return 404 "Onbekende preview-hostname\n";
            }

            location / {
                # Variabele in proxy_pass forceert runtime-resolve via
                # bovenstaande resolver. Zonder variabele zou nginx
                # bij startup een statische lookup proberen (faalt).
                set $upstream "frontend.${preview_ns}.svc.cluster.local";
                proxy_pass http://$upstream:8080;

                proxy_http_version 1.1;
                proxy_set_header Host              $host;
                proxy_set_header X-Real-IP         $remote_addr;
                proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header Upgrade           $http_upgrade;
                proxy_set_header Connection        $connection_upgrade;

                proxy_read_timeout 600s;

                # Als de preview-namespace niet bestaat: 502 → user-vriendelijk
                # foutbericht.
                proxy_intercept_errors on;
                error_page 502 503 504 = @upstream_down;
            }

            location @upstream_down {
                add_header Content-Type text/plain always;
                return 503 "Preview '${preview_ns}' bestaat niet of is nog niet klaar.\nProbeer opnieuw over 1-2 minuten.\n";
            }
        }
    }
