# nginx-config voor de preview-router. Ontvangt traffic voor
# `*.vdzonsoftware.nl` via de Cloudflare-tunnel en route't naar
# de juiste preview-namespace op basis van de hostname.
#
# Hostname-format: pnf-pr-<num>.vdzonsoftware.nl
# → namespace: pnf-pr-<num>
# → upstream:  frontend.pnf-pr-<num>.svc.cluster.local:8080
#
# We gebruiken de templating-feature van de officiële nginx image:
# bestanden in /etc/nginx/templates/*.template worden bij startup door
# envsubst gehaald. De variabele $NGINX_LOCAL_RESOLVERS wordt automatisch
# gevuld met de DNS-servers uit /etc/resolv.conf van de pod — zo werkt
# de resolver-directive zonder een hostname (die nginx anders bij startup
# probeert te resolven en faalt op OpenShift).
apiVersion: v1
kind: ConfigMap
metadata:
  name: preview-router-config
  labels:
    app: preview-router
data:
  # Geen $-tekens hier — nginx vars worden door envsubst pas vervangen
  # waar we ze expliciet vermelden (zie spec.containers[].env).
  default.conf.template: |
    # Match-and-extract namespace uit `<ns>.vdzonsoftware.nl`.
    # Veiligheidsklep: alleen patroon dat met `pnf-` start mag matchen,
    # zo voorkomen we dat iemand via een eigen DNS-CNAME willekeurige
    # cluster-services kan aanspreken.
    map $host $preview_ns {
        default "";
        "~^(pnf-[a-z0-9-]+)\.vdzonsoftware\.nl$" $1;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Gebruik de pod's eigen nameserver(s) — wordt door
    # 15-local-resolvers.envsh in de nginx-image gezet.
    resolver ${NGINX_LOCAL_RESOLVERS} valid=5s;

    server {
        listen       8080 default_server;
        server_name  _;

        if ($preview_ns = "") {
            return 404 "Onbekende preview-hostname\n";
        }

        location / {
            # Variabele in proxy_pass dwingt runtime-resolve via resolver.
            set $upstream "frontend.${preview_ns}.svc.cluster.local";
            proxy_pass http://$upstream:8080;

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout 600s;

            proxy_intercept_errors on;
            error_page 502 503 504 = @upstream_down;
        }

        location @upstream_down {
            add_header Content-Type text/plain always;
            return 503 "Preview '${preview_ns}' bestaat niet of is nog niet klaar.\nProbeer opnieuw over 1-2 minuten.\n";
        }
    }
