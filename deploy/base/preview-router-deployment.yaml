# Preview-router: nginx-pod die *.preview.vdzonsoftware.nl traffic
# host-based route't naar de juiste preview-namespace.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: preview-router
  labels:
    app: preview-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: preview-router
  template:
    metadata:
      labels:
        app: preview-router
    spec:
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          # Voorkom dat envsubst onze $-vars in nginx.conf (zoals $host,
          # $upstream, etc.) probeert te vervangen. Alleen $NGINX_LOCAL_RESOLVERS
          # moeten we vervangen — die staat expliciet in deze whitelist.
          env:
            - name: NGINX_ENVSUBST_FILTER
              value: "NGINX_LOCAL_RESOLVERS"
          volumeMounts:
            # `templates`-pad wordt door de nginx-entrypoint via envsubst
            # gehaald en het resultaat in /etc/nginx/conf.d/ gezet.
            - name: config
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf.template
              readOnly: true
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: preview-router-config
---
apiVersion: v1
kind: Service
metadata:
  name: preview-router
  labels:
    app: preview-router
spec:
  selector:
    app: preview-router
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
