---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: newsfeed-api-keys
  namespace: personal-news-feed
spec:
  encryptedData:
    ATLASSIAN_API_KEY: 
    CLAUDE_AI_OAUTH_CREDENTIALS_JSON: 
    CLAUDE_CODE_OAUTH_TOKEN: 
    DASHBOARD_ADMIN_PASSWORD: 
    FACTORY_DATABASE_URL: 
    GITHUB_TOKEN: 
    JWT_SECRET: 
    NEON_API_KEY: 
    NEON_PROJECT_ID: 
    OPENSHIFT_API_TOKEN: 
    PNF_ANTHROPIC_API_KEY: 
    PNF_DATABASE_URL: 
    PNF_ELEVENLABS_API_KEY: 
    PNF_OPENAI_API_KEY: 
    PNF_TAVILY_API_KEY: 
    SF_YOUTRACK_BASE_URL: 
    SF_YOUTRACK_TOKEN: 
    TESTER_PASSWORD: 
    TESTER_USERNAME: 
    TUNNEL_TOKEN: 
  template:
    metadata:
      annotations:
        reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
        reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: ^(pnf-.*|argocd)$
        reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
        reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: ^(pnf-.*|argocd)$
      name: newsfeed-api-keys
      namespace: personal-news-feed
    type: Opaque
