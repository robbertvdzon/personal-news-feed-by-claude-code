---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: newsfeed-api-keys
  namespace: personal-news-feed
spec:
  encryptedData:
    ATLASSION_API_KEY: 
    GITHUB_TOKEN: 
    JWT_SECRET: 
    PNF_ANTHROPIC_API_KEY: 
    PNF_DATABASE_URL: 
    PNF_ELEVENLABS_API_KEY: 
    PNF_OPENAI_API_KEY: 
    PNF_TAVILY_API_KEY: 
    TUNNEL_TOKEN: 
  template:
    metadata:
      name: newsfeed-api-keys
      namespace: personal-news-feed
      annotations:
        # Reflector mirror't deze Secret naar elke nieuwe pnf-* namespace
        # zodra die wordt aangemaakt. Preview-backends gebruiken dezelfde
        # credentials zonder per-namespace SealedSecret te hoeven seal'en.
        reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
        reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "pnf-.*"
        reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
        reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "pnf-.*"
    type: Opaque
