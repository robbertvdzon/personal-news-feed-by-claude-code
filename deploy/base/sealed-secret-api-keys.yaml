---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: newsfeed-api-keys
  namespace: personal-news-feed
spec:
  encryptedData:
    ATLASSIAN_API_KEY: 
    GITHUB_TOKEN: 
    JWT_SECRET: 
    PNF_ANTHROPIC_API_KEY: 
    PNF_DATABASE_URL: 
    PNF_ELEVENLABS_API_KEY: 
    PNF_OPENAI_API_KEY: 
    PNF_TAVILY_API_KEY: 
    TUNNEL_TOKEN: 
  template:
    metadata:
      annotations:
        reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
        reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: pnf-.*
        reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
        reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: pnf-.*
      name: newsfeed-api-keys
      namespace: personal-news-feed
    type: Opaque
