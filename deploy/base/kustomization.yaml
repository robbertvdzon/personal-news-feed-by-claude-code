# Base manifest set voor de personal-news-feed app. De /deploy/overlays/
# kunnen 'm uitbreiden of overrulen.
#
# `images:` wordt door GitHub Actions automatisch geüpdate na elke
# image-build (kustomize edit set image …). Lokaal/handmatig override'n
# kan ook met `kustomize edit set image backend=...:sha-…`.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: personal-news-feed

# namespace.yaml NIET via ArgoCD — onze ArgoCD draait in "namespaced mode"
# en mag geen cluster-scoped resources beheren. De namespace wordt door
# deploy/bootstrap.sh aangemaakt mét de argocd managed-by label.
resources:
- backend-pvc.yaml
- backend-deployment.yaml
- backend-service.yaml
- backend-route.yaml
- frontend-deployment.yaml
- frontend-service.yaml
- frontend-route.yaml
- cloudflared-deployment.yaml
- sealed-secret-api-keys.yaml

commonLabels:
  app.kubernetes.io/managed-by: argocd
  app.kubernetes.io/part-of: personal-news-feed

images:
- name: backend
  newName: ghcr.io/robbertvdzon/personal-news-feed-backend
  newTag: sha-b92deee
- name: frontend
  newName: ghcr.io/robbertvdzon/personal-news-feed-frontend
  newTag: sha-b92deee
