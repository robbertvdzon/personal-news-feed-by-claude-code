# Base manifest set voor de personal-news-feed app. De /deploy/overlays/
# kunnen 'm uitbreiden of overrulen.
#
# `images:` wordt door GitHub Actions automatisch geüpdate na elke
# image-build (kustomize edit set image …). Lokaal/handmatig override'n
# kan ook met `kustomize edit set image backend=...:sha-…`.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: personal-news-feed

# Geen namespace.yaml in resources: de Application maakt de namespace zelf
# aan via CreateNamespace=true (werkt sinds ArgoCD cluster-scoped draait,
# 2026-07-08 — daarvóór was deploy/bootstrap.sh hiervoor verplicht, zie
# robberts-infrastructure/docs/architecture.md "Historie").
resources:
- backend-pvc.yaml
- backend-deployment.yaml
- backend-service.yaml
- backend-route.yaml
- frontend-deployment.yaml
- frontend-service.yaml
- frontend-route.yaml
- reader-deployment.yaml
- reader-service.yaml
- reader-route.yaml
- cloudflared-deployment.yaml
- preview-router-config.yaml
- preview-router-deployment.yaml
- sealed-secret-api-keys.yaml

commonLabels:
  app.kubernetes.io/managed-by: argocd
  app.kubernetes.io/part-of: personal-news-feed

images:
- name: backend
  newName: ghcr.io/robbertvdzon/personal-news-feed-backend
  newTag: sha-c0fb95a
- name: frontend
  newName: ghcr.io/robbertvdzon/personal-news-feed-frontend
  newTag: sha-c0fb95a
- name: reader
  newName: ghcr.io/robbertvdzon/personal-news-feed-reader
  newTag: sha-c0fb95a
