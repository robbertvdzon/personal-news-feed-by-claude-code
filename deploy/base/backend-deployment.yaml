apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  strategy:
    type: Recreate     # Audio-PVC is RWO → kan niet door 2 pods tegelijk
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # Wordt door GitHub Actions geüpdate via `kustomize edit set image`.
          image: ghcr.io/robbertvdzon/personal-news-feed-backend:main
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_DATA_DIR
              value: /data
            # Alle secrets uit de SealedSecret. Spring Boot accepteert
            # zowel `SPRING_DATASOURCE_URL` (env-style) als
            # `spring.datasource.url` (property-style) — env-style wint.
            - name: PNF_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: PNF_DATABASE_URL
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: PNF_DATABASE_URL
            - name: PNF_ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: PNF_ANTHROPIC_API_KEY
            - name: PNF_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: PNF_OPENAI_API_KEY
                  optional: true
            - name: PNF_TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: PNF_TAVILY_API_KEY
                  optional: true
            - name: PNF_ELEVENLABS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: PNF_ELEVENLABS_API_KEY
                  optional: true
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: JWT_SECRET
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 12      # ~1 min startup-time toestaan
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: backend-data
