apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  strategy:
    type: Recreate     # Audio-PVC is RWO → kan niet door 2 pods tegelijk
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # `image: backend` is een placeholder die door kustomize wordt
          # vervangen via de `images:`-sectie in kustomization.yaml. De
          # echte waarde wordt door GitHub Actions geüpdate via
          # `kustomize edit set image backend=ghcr.io/...:sha-…`.
          image: backend
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            # JVM-heap = 70% van de container-limit (1Gi) i.p.v. de
            # default 25% (= 256Mi). Zonder dit OOM't de KAN-63 podcast-
            # vertaal-flow: de TTS-fase buffert per chunk de mp3-response
            # in heap (HttpResponse.ofByteArray) + houdt alle chunks +
            # de 60k-char vertaling tegelijk vast. 256Mi heap is daarvoor
            # te krap (OOM op chunk 3/16). 70% laat ~300Mi over voor
            # non-heap (metaspace, threads, direct buffers).
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=70.0"
            # JVM-tijdzone voor @Scheduled crons (en logs). Cron
            # "0 0 6 * * *" hoort op 06:00 lokaal te vuren, niet 06:00 UTC.
            - name: TZ
              value: Europe/Amsterdam
            - name: APP_DATA_DIR
              value: /data
            # Alle secrets uit de SealedSecret. Spring Boot accepteert
            # zowel `SPRING_DATASOURCE_URL` (env-style) als
            # `spring.datasource.url` (property-style) — env-style wint.
            - name: PNF_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: PNF_DATABASE_URL
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: PNF_DATABASE_URL
            - name: PNF_ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: PNF_ANTHROPIC_API_KEY
            - name: PNF_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: PNF_OPENAI_API_KEY
                  optional: true
            - name: PNF_TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: PNF_TAVILY_API_KEY
                  optional: true
            - name: PNF_ELEVENLABS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: PNF_ELEVENLABS_API_KEY
                  optional: true
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: JWT_SECRET
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 200m
              # 512Mi request (was 256Mi) zodat de scheduler genoeg
              # geheugen reserveert voor de 70%-heap + non-heap; anders
              # risico op cgroup-OOM-kill onder node-druk.
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 12      # ~1 min startup-time toestaan
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: backend-data
