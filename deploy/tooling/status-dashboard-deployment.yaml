# Status-dashboard: een kleine Flask-service die GitHub + ArgoCD + pod-
# status bij elkaar harkt en op één HTML-pagina toont.
#
# Toegankelijk maken vanaf buiten: voeg in Cloudflare Zero Trust een
# public hostname toe (b.v. status.vdzonsoftware.nl) die wijst naar
#   http://status-dashboard.personal-news-feed.svc.cluster.local:80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-dashboard
  namespace: pnf-software-factory
  labels:
    app: status-dashboard
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: status-dashboard
  template:
    metadata:
      labels:
        app: status-dashboard
    spec:
      serviceAccountName: status-dashboard
      containers:
        - name: dashboard
          image: ghcr.io/robbertvdzon/status-dashboard:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: GITHUB_TOKEN
            - name: GITHUB_OWNER
              value: "robbertvdzon"
            - name: GITHUB_REPO
              value: "personal-news-feed-by-claude-code"
            - name: ARGOCD_NS
              value: "argocd"
            - name: PROD_NS
              value: "personal-news-feed"
            # FACTORY_NS = waar de claude-runner Jobs draaien. Sinds de
            # namespace-split is dat een eigen pnf-software-factory.
            - name: FACTORY_NS
              value: "pnf-software-factory"
            # OpenShift-console host voor klikbare "Open in OpenShift"-
            # links per K8s Job. Werkt alleen op het thuis-netwerk (geen
            # Cloudflare-tunnel voor de console). Leeg = geen link.
            - name: OPENSHIFT_CONSOLE_HOST
              value: "console-openshift-console.apps.sno.lab.vdzon.com"
            - name: APP_BASE_URL
              value: "https://vdzonsoftware.nl"
            - name: PREVIEW_URL_FORMAT
              value: "https://pnf-pr-{pr}.vdzonsoftware.nl"
            - name: CACHE_TTL_SEC
              value: "15"
            - name: REFRESH_SEC
              value: "15"
            # JIRA-config voor de "AI bezig"-sectie (stories tussen
            # 'AI Ready' → eerste PR). Hergebruikt dezelfde credentials
            # als de jira-poller.
            - name: JIRA_BASE_URL
              value: "https://vdzon.atlassian.net"
            - name: JIRA_EMAIL
              value: "robbert@vdzon.com"
            - name: JIRA_PROJECT
              value: "KAN"
            - name: JIRA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: ATLASSIAN_API_KEY
            # Factory-DB voor token/cost-lookups per story-card en de
            # /story/<key>-timeline. Leeg laten = sectie wordt overgeslagen.
            - name: FACTORY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: FACTORY_DATABASE_URL
            # Admin-wachtwoord voor de /api/v1/* JSON-API (Fase 1 — Flutter
            # dashboard backend). Eén user 'admin' met dit wachtwoord
            # via POST /api/v1/auth/login → JWT.
            - name: DASHBOARD_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: DASHBOARD_ADMIN_PASSWORD
            # JWT-signing-key (stabiel over pod-restarts). Zonder deze
            # genereert app.py een random secret per pod-start, met als
            # gevolg dat elke deploy alle clients uitlogt.
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: JWT_SECRET
            # CORS-origin voor de Flutter-dashboard-app.
            - name: DASHBOARD_CORS_ORIGIN
              value: "https://dashboard.vdzonsoftware.nl"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 20m
              memory: 96Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: status-dashboard
  namespace: pnf-software-factory
  labels:
    app: status-dashboard
spec:
  selector:
    app: status-dashboard
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
