# Schema-bootstrap voor het `factory`-schema in de Neon-DB. Run't bij
# elke ArgoCD-sync als PreSync-hook; CREATE ... IF NOT EXISTS maakt 'm
# idempotent.
#
# Bij toekomstige schema-wijzigingen onderaan factory-schema.sql
# `ALTER TABLE … ADD COLUMN IF NOT EXISTS …` toevoegen — geen migratie-
# framework, dat is voor een latere fase als 't ooit nodig blijkt.
#
# De `factory-schema-sql` ConfigMap met de DDL wordt door kustomize's
# configMapGenerator gemaakt (zie kustomization.yaml).
apiVersion: batch/v1
kind: Job
metadata:
  name: factory-db-init
  namespace: pnf-software-factory
  annotations:
    # PreSync zorgt dat schema klaar is voordat poller/dashboard starten.
    # BeforeHookCreation ruimt de vorige hook-Job op vóór deze draait,
    # zodat we niet eindeloos `factory-db-init-1`, `-2`-Jobs krijgen.
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: factory-db-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: psql
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              set -e
              echo "[init] applying factory-schema.sql..."
              psql "$FACTORY_DATABASE_URL" -v ON_ERROR_STOP=1 -f /sql/factory-schema.sql
              echo "[init] done."
          env:
            - name: FACTORY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: FACTORY_DATABASE_URL
          volumeMounts:
            - name: sql
              mountPath: /sql
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: sql
          configMap:
            name: factory-schema-sql
