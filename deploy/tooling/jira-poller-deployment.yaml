apiVersion: apps/v1
kind: Deployment
metadata:
  name: jira-poller
  namespace: pnf-software-factory
  labels:
    app: jira-poller
spec:
  replicas: 1            # geen multi-replica — anders dubbele transitions
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: jira-poller
  template:
    metadata:
      labels:
        app: jira-poller
    spec:
      serviceAccountName: jira-poller
      containers:
        - name: poller
          image: ghcr.io/robbertvdzon/jira-poller:main
          imagePullPolicy: Always
          env:
            - name: JIRA_BASE_URL
              value: "https://vdzon.atlassian.net"
            - name: JIRA_EMAIL
              value: "robbert@vdzon.com"
            - name: JIRA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: ATLASSIAN_API_KEY
            - name: JIRA_PROJECT
              value: "KAN"
            - name: JIRA_SOURCE_STATUS
              value: "AI Ready"
            - name: JIRA_TARGET_STATUS
              value: "AI IN PROGRESS"
            - name: JIRA_REVIEW_STATUS
              value: "AI IN REVIEW"
            - name: JIRA_DONE_STATUS
              value: "Klaar"
            # GITHUB_TOKEN nodig voor merge-detectie (S-07): zoekt PR's
            # bij issues in AI IN REVIEW en checkt of ze gemerged zijn.
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: GITHUB_TOKEN
            # OpenShift Console-host voor klikbare log-links in JIRA.
            # Werkt alleen op het thuis-netwerk (geen Cloudflare-tunnel
            # voor de console). Laat leeg om de log-link weg te laten.
            - name: OPENSHIFT_CONSOLE_HOST
              value: "console-openshift-console.apps.sno.lab.vdzon.com"
            - name: POLL_INTERVAL_SEC
              value: "30"
            - name: MAX_CONCURRENT_JOBS
              value: "2"
            - name: CLAUDE_RUNNER_IMAGE
              value: "ghcr.io/robbertvdzon/claude-runner:main"
            - name: RUNNER_NAMESPACE
              value: "pnf-software-factory"
            - name: REPO_URL
              value: "https://github.com/robbertvdzon/personal-news-feed-by-claude-code.git"
            # Factory-DB voor agent-run-rapportage (Fase 1). Connection-
            # string in postgresql:// form (geen jdbc:-prefix). Leeg
            # laten betekent: HTTP-endpoint geeft 503 maar polling-loop
            # blijft draaien.
            - name: FACTORY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: newsfeed-api-keys
                  key: FACTORY_DATABASE_URL
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 20m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 384Mi
          volumeMounts:
            - name: agent-levels
              mountPath: /etc/factory
              readOnly: true
      volumes:
        - name: agent-levels
          configMap:
            name: agent-levels
---
apiVersion: v1
kind: Service
metadata:
  name: jira-poller
  namespace: pnf-software-factory
  labels:
    app: jira-poller
spec:
  selector:
    app: jira-poller
  ports:
    - name: http
      port: 8080
      targetPort: http
  type: ClusterIP
