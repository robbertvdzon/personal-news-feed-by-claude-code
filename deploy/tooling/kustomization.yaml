# Kustomization voor de "tooling"-deployments rond de AI-pipeline:
# jira-poller en status-dashboard. Wordt door ArgoCD gesynct vanuit
# deploy/tooling-application.yaml.
#
# Bewust gescheiden van deploy/base/:
#   * deploy/base/   = de applicatie zelf (frontend + backend + tunnel)
#   * deploy/tooling = de cluster-side automation die er omheen zit
#
# De RBAC voor deze services (ClusterRole, ClusterRoleBinding) blijft
# in deploy/<service>/rbac.yaml + apply via bootstrap.sh — onze ArgoCD
# draait in namespaced mode en mag geen cluster-scoped resources beheren.
#
# `images:` wordt door CI automatisch ge-bumpt na elke image-build (zie
# .github/workflows/{jira-poller,status-dashboard}-image.yml). Hand-bumpen
# kan ook met `kustomize edit set image ...` vanuit deze map.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Alle factory-Deployments leven in `pnf-software-factory`. De namespace-
# directive overschrijft de `namespace:`-velden in de Deployment-files
# (die ook al naar pnf-software-factory wijzen — dubbel verklaard zodat
# het in beide views klopt).
# Bewust GEEN commonLabels: dat zou de Deployment-selector willen
# aanpassen (immutable veld) en een eerste sync laten falen.
namespace: pnf-software-factory

resources:
- jira-poller-deployment.yaml
- status-dashboard-deployment.yaml

# Schema-init voor de factory-DB gebeurt in de poller zelf bij startup
# (zie poller.py, `init_schema()`). Dat is eenvoudiger dan een aparte
# init-Job + ConfigMap + ArgoCD-PreSync-hook, en de DDL is idempotent
# dus runs-on-every-restart is goedkoop.

# Level-matrix ConfigMap: per AI Level (0-10) welke model+effort elke
# rol gebruikt. Wordt in de poller-Deployment als file gemount op
# /etc/factory/agent-levels.yaml. `disableNameSuffixHash` houdt de
# naam stabiel zodat de volume-mount statisch kan blijven.
configMapGenerator:
- files:
  - agent-levels.yaml
  name: agent-levels
  options:
    disableNameSuffixHash: true

images:
- name: ghcr.io/robbertvdzon/jira-poller
  newName: ghcr.io/robbertvdzon/jira-poller
  newTag: sha-c6e50b3
- name: ghcr.io/robbertvdzon/status-dashboard
  newName: ghcr.io/robbertvdzon/status-dashboard
  newTag: sha-222af27
