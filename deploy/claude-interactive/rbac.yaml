# RBAC voor interactieve Claude-sessies (KAN-61).
#
# Een interactieve sessie is een handmatig vanuit het dashboard
# gestarte long-running pod met de Claude Code CLI in /remote-modus.
# De PO geeft vanaf z'n mobiel commando's; de pod voert ze uit met
# admin-RBAC op het cluster.
#
# Risico: deze SA kan veel meer dan de bestaande tester-SA (write,
# delete, patch — overal). Dat is bewust het hele punt; de waarde
# zit juist in dat de sessie productieve cluster-mutaties kan doen.
# In ruil daarvoor:
#   * Hard cap van 3 sessies tegelijk (backend-enforcement).
#   * Welkomstprompt waarschuwt expliciet over de scope.
#   * Sessies zijn altijd alleen-via-dashboard te starten (geen
#     automatische lifecycle via JIRA).
#
# Cluster-scoped objecten (ClusterRoleBinding) gaan eenmalig via
# bootstrap.sh; ArgoCD draait namespaced en mag ze niet beheren.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-interactive
  namespace: pnf-software-factory
---
# We binden direct tegen de built-in `cluster-admin` ClusterRole. Geen
# eigen ClusterRole-definitie nodig — het hele punt van deze sessie is
# "alles wat een admin ook kan", dus aliassen we ons aan de bestaande.
# Subjects-filter beperkt de toegang tot precies deze ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: claude-interactive-admin
subjects:
  - kind: ServiceAccount
    name: claude-interactive
    namespace: pnf-software-factory
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
